name: my_first_project
description: "A YouTube Downloader app converted from Python."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  youtube_explode_dart: ^3.0.5
  path_provider: ^2.1.1
  file_picker: ^10.3.10
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/logo_foreground.png"
  adaptive_icon_background: "#ffffff"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - logo/folder.png
    - logo/YT Downloader By Yossef Ibrahim.png
    - logo/icon_YT.ico
    - assets/icon.png
